name: Deploy static site to Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          enable_jekyll: false

      - name: Enable Pages source (gh-pages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          curl -s -o /tmp/pages-response.txt -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' > /tmp/pages-status.txt

          status=$(cat /tmp/pages-status.txt)
          echo "Pages API status: $status"
          cat /tmp/pages-response.txt

          # 201 Created, 204 No Content, 409 Already exists are all acceptable here.
          if [ "$status" != "201" ] && [ "$status" != "204" ] && [ "$status" != "409" ]; then
            echo "Pages enablement call did not return an expected status"
          fi
